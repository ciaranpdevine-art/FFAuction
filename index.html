<script>
  // Surfaces otherwise-silent script failures directly on the page,
  // since phones can't easily open devtools to see the console.
  function showFatalError(msg) {
    var el = document.getElementById("app");
    el.className = "center-msg";
    el.innerHTML =
      '<div style="max-width:340px;text-align:left;padding:20px;font-family:sans-serif;">' +
      '<div style="font-weight:700;margin-bottom:8px;color:#B5482A;">Couldn\'t load the page</div>' +
      '<div style="font-size:13px;color:#71695A;line-height:1.5;">' + msg + '</div>' +
      '</div>';
  }
  window.addEventListener("error", function (e) {
    showFatalError("Script error: " + (e.message || "unknown error") + (e.filename ? " (" + e.filename.split("/").pop() + ":" + e.lineno + ")" : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    showFatalError("Unhandled error: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
  });
  setTimeout(function () {
    var el = document.getElementById("app");
    if (el && el.textContent.indexOf("Loading table") !== -1) {
      showFatalError(
        "Still loading after 10 seconds with no error reported — this usually means the connection to the Firebase library or your database timed out. Check your internet connection, and double-check the Firestore database was created in the Firebase console."
      );
    }
  }, 10000);
</script>

function uid(prefix) { return prefix + Math.random().toString(36).slice(2, 9); }
function esc(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

const CLUB_PALETTE = ["#3E7C59", "#8A5A44", "#3B4A7A", "#B5482A", "#6B7F3E", "#5A4A8A", "#234D35", "#7A4A5A", "#4A6B7A", "#8A7A3E"];
function clubInitials(club) {
  const words = String(club).trim().split(/\s+/).filter(Boolean);
  if (!words.length) return "?";
  if (words.length === 1) return words[0].slice(0, 3).toUpperCase();
  return words.map((w) => w[0]).join("").slice(0, 3).toUpperCase();
}
function clubColor(club) {
  let hash = 0;
  const str = String(club || "");
  for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  return CLUB_PALETTE[hash % CLUB_PALETTE.length];
}
function clubCrest(club) {
  if (!club) return "";
  return `<span class="club-crest" style="background:${clubColor(club)}">${clubInitials(club)}</span>`;
}

function scheduleFromSnapshot(next) {

function normalizeSquadEntry(entry) {
  // Legacy squads stored plain ids; new squads store {id, cost} so the same
  // pool player can carry a different auction price per team.
  if (typeof entry === "string") return { id: entry, cost: null };
  return { id: entry.id, cost: entry.cost !== undefined ? entry.cost : null };
}

function getSquadEntries(d, team) {
  if (Array.isArray(team.squad)) return team.squad.map(normalizeSquadEntry);
  // Pre-squad-builder teams: fall back to players still tagged with this teamId.
  return d.players.filter((p) => p.teamId === team.id).map((p) => ({ id: p.id, cost: null }));
}

function getTeamRosterIds(d, team) {
  return getSquadEntries(d, team).map((e) => e.id);
}

function findOwningTeam(d, playerId) {
  return d.teams.find((t) => getSquadEntries(d, t).some((e) => e.id === playerId));
}

function computeTeamTotals(d, week) {
  const totals = d.teams.map((team) => {
    const entries = getSquadEntries(d, team);
    let total = 0;
    const rosterWithPoints = entries.map((entry) => {
      const p = d.players.find((pp) => pp.id === entry.id);
      if (!p) return null;
      const weekly = d.scores[p.id] || {};
      const pts = week ? (weekly[week] || 0) : Object.values(weekly).reduce((a, b) => a + b, 0);
      total += pts;
      // Auction cost (per-team) takes priority; falls back to the pool player's own cost for legacy data.
      const cost = entry.cost !== null && entry.cost !== undefined ? entry.cost : (p.cost || 0);
      return { ...p, points: pts, cost };
    }).filter(Boolean);
    return { ...team, roster: rosterWithPoints, total };
  });
  totals.sort((a, b) => b.total - a.total);
  return totals;
}

// ---- Render ----
function render() {
  if (!data) { appEl.className = "center-msg"; appEl.textContent = "Loading table…"; return; }
  appEl.className = "page";
  document.title = data.leagueName + " — Weekly Standings";

  // Remember horizontal scroll position of tab/chip bars so a full re-render
  // (which rebuilds the whole DOM) doesn't snap them back to the start.
  appEl.querySelectorAll("[data-scroll-id]").forEach((el) => {
    scrollPositions[el.dataset.scrollId] = el.scrollLeft;
  });

  const teamTotals = computeTeamTotals(data, selectedWeek);
  const seasonTotals = computeTeamTotals(data, null);
  const weekOptions = Array.from({ length: data.totalWeeks }, (_, i) => i + 1);
  if (!selectedTeamId && data.teams.length) selectedTeamId = data.teams[0].id;

  appEl.innerHTML = `
    ${renderHeader()}
    <main class="main">
      ${view !== "admin" ? renderModeToggle() : ""}
      ${view === "public" && subView === "table" ? renderWeekBar(weekOptions) + renderTable(teamTotals) : ""}
      ${view === "public" && subView === "teams" ? renderTeamSelectBar() + renderRosterCard(seasonTotals) : ""}
      ${view === "public" && subView === "players" ? renderPlayerList() : ""}
      ${view === "public" && subView === "fixtures" ? renderFixtures() : ""}
      ${view === "public" && subView === "transfers" ? renderTransfers() : ""}
      ${view === "public" && subView === "cup" ? renderCupGames() : ""}
      ${view === "public" && subView === "prizes" ? renderPrizes() : ""}
      ${view === "login" ? renderLogin() : ""}
      ${view === "admin" ? renderAdmin(weekOptions) : ""}
    </main>
    ${renderFooter()}
  `;
  bindEvents();
}

function renderPlayerList() {
  const filters = [

    return `

        const owner = findOwningTeam(data, p.id);

function renderRosterCard(seasonTotals) {
  const team = seasonTotals.find((t) => t.id === selectedTeamId) || seasonTotals[0];
  if (!team) return `<div class="muted">No teams yet.</div>`;
  const totalCost = team.roster.reduce((sum, p) => sum + (p.cost || 0), 0);
  const budget = data.budgetPerTeam ?? 100;
  const remaining = budget - totalCost;
  const formation = team.formation || "442";
  return `
    <div class="roster-card">
      <div class="roster-card-head">
        <span class="roster-card-title">
          <span class="dot" style="background:${team.color}"></span>${esc(team.name)}
          <span class="pos-badge" style="margin-left:8px;">${formation.split("").join("-")}</span>
        </span>
        <div class="roster-totals">
          <div><div class="stat-label">Season pts</div>${scoreTile(team.total, false, true, false)}</div>
        </div>
      </div>

        <div style="text-align:center;"><div class="stat-label">Spent</div>${scoreTile(fmtCost(totalCost), true, false, false, true)}</div>
        <div style="text-align:center;"><div class="stat-label">Remaining budget</div>${scoreTile(fmtCost(remaining), true, remaining < 0, false, remaining >= 0)}</div>
      </div>
      ${team.roster.slice().sort((a, b) => b.points - a.points).map((p) => `
        <div class="roster-player-row">
          <span class="roster-player-info">
            <span class="roster-player-name">${p.position ? `<span class="pos-badge">${p.position}</span>` : ""}${esc(p.name)}</span>

          </span>
          <div style="text-align:center;"><div class="stat-label">Cost</div>${scoreTile(fmtCost(p.cost || 0), true, false, false, true)}</div>

        </div>
      `).join("")}
    </div>
  `;
}

function fmtCost(n) {
  const num = Number(n) || 0;
  return CURRENCY_SYMBOL + (Number.isInteger(num) ? num : num.toFixed(1)) + "m";
}

function teamNameById(id) {
  const t = data.teams.find((tm) => tm.id === id);
  return t ? t.name : "TBD";
}
function teamColorById(id) {
  const t = data.teams.find((tm) => tm.id === id);
  return t ? t.color : "#999";
}
