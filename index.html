  // Surfaces otherwise-silent script failures directly on the page,
  // since phones can't easily open devtools to see the console.
  function showFatalError(msg) {
    var el = document.getElementById("app");
    el.className = "center-msg";
    el.innerHTML =
      '<div style="max-width:340px;text-align:left;padding:20px;font-family:sans-serif;">' +
      '<div style="font-weight:700;margin-bottom:8px;color:#B5482A;">Couldn\'t load the page</div>' +
      '<div style="font-size:13px;color:#71695A;line-height:1.5;">' + msg + '</div>' +
      '</div>';
  }
  window.addEventListener("error", function (e) {
    showFatalError("Script error: " + (e.message || "unknown error") + (e.filename ? " (" + e.filename.split("/").pop() + ":" + e.lineno + ")" : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    showFatalError("Unhandled error: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
  });
  setTimeout(function () {
    var el = document.getElementById("app");
    if (el && el.textContent.indexOf("Loading table") !== -1) {
      showFatalError(
        "Still loading after 10 seconds with no error reported — this usually means the connection to the Firebase library or your database timed out. Check your internet connection, and double-check the Firestore database was created in the Firebase console."
      );
    }
  }, 10000);
</script>

function uid(prefix) { return prefix + Math.random().toString(36).slice(2, 9); }
function esc(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

const CLUB_PALETTE = ["#3E7C59", "#8A5A44", "#3B4A7A", "#B5482A", "#6B7F3E", "#5A4A8A", "#234D35", "#7A4A5A", "#4A6B7A", "#8A7A3E"];
function clubInitials(club) {
  const words = String(club).trim().split(/\s+/).filter(Boolean);
  if (!words.length) return "?";
  if (words.length === 1) return words[0].slice(0, 3).toUpperCase();
  return words.map((w) => w[0]).join("").slice(0, 3).toUpperCase();
}
function clubColor(club) {
  let hash = 0;
  const str = String(club || "");
  for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  return CLUB_PALETTE[hash % CLUB_PALETTE.length];
}
function clubCrest(club) {
  if (!club) return "";
  return `<span class="club-crest" style="background:${clubColor(club)}">${clubInitials(club)}</span>`;

function scheduleFromSnapshot(next) {

async function persist(next) {

// ---- Derived data ----
function computeTeamTotals(d, week) {
  const totals = d.teams.map((team) => {
    const roster = d.players.filter((p) => p.teamId === team.id);
    let total = 0;
    const rosterWithPoints = roster.map((p) => {
      const weekly = d.scores[p.id] || {};
      const pts = week ? (weekly[week] || 0) : Object.values(weekly).reduce((a, b) => a + b, 0);
      total += pts;
      return { ...p, points: pts };
    });
    return { ...team, roster: rosterWithPoints, total };
  });
  totals.sort((a, b) => b.total - a.total);
  return totals;
}

// ---- Render ----
function render() {
  if (!data) { appEl.className = "center-msg"; appEl.textContent = "Loading table…"; return; }
  appEl.className = "page";
  document.title = data.leagueName + " — Weekly Standings";

  const teamTotals = computeTeamTotals(data, selectedWeek);
  const seasonTotals = computeTeamTotals(data, null);
  const weekOptions = Array.from({ length: data.totalWeeks }, (_, i) => i + 1);
  if (!selectedTeamId && data.teams.length) selectedTeamId = data.teams[0].id;

  appEl.innerHTML = `
    ${renderHeader()}
    <main class="main">
      ${view !== "admin" ? renderModeToggle() : ""}
      ${view === "public" && subView === "table" ? renderWeekBar(weekOptions) + renderTable(teamTotals) : ""}
      ${view === "public" && subView === "teams" ? renderTeamSelectBar() + renderRosterCard(seasonTotals) : ""}
      ${view === "public" && subView === "fixtures" ? renderFixtures() : ""}
      ${view === "public" && subView === "transfers" ? renderTransfers() : ""}
      ${view === "public" && subView === "cup" ? renderCupGames() : ""}
      ${view === "public" && subView === "prizes" ? renderPrizes() : ""}
      ${view === "login" ? renderLogin() : ""}
      ${view === "admin" ? renderAdmin(weekOptions) : ""}
    </main>
    ${renderFooter()}
  `;
  bindEvents();
}

function renderModeToggle() {
  const tabs = [
    ["table", "League table"],
    ["teams", "Team view"],
    ["fixtures", "Fixtures"],
    ["transfers", "Transfers"],
    ["cup", "Cup games"],
    ["prizes", "Prizes"],
  ];
  return `
    <div class="mode-toggle">
      ${tabs.map(([key, label]) => `<button class="mode-btn ${subView === key ? "active" : ""}" data-action="set-subview" data-subview="${key}">${label}</button>`).join("")}
    </div>
  `;
}

function renderTeamSelectBar() {
  return `
    <div class="team-select-bar">
      ${data.teams.map((t) => `
        <button class="team-chip ${selectedTeamId === t.id ? "active" : ""}" data-action="select-team-view" data-team-id="${t.id}">
          <span class="dot" style="background:${t.color};margin-right:0;"></span>${esc(t.name)}
        </button>
      `).join("")}
    </div>
  `;
}

function renderRosterCard(seasonTotals) {
  const team = seasonTotals.find((t) => t.id === selectedTeamId) || seasonTotals[0];
  if (!team) return `<div class="muted">No teams yet.</div>`;
  const totalCost = team.roster.reduce((sum, p) => sum + (p.cost || 0), 0);
  return `
    <div class="roster-card">
      <div class="roster-card-head">
        <span class="roster-card-title"><span class="dot" style="background:${team.color}"></span>${esc(team.name)}</span>
        <div class="roster-totals">
          <div><div class="stat-label">Cost</div>${scoreTile(fmtCost(totalCost), false, false, false, true)}</div>
          <div><div class="stat-label">Season pts</div>${scoreTile(team.total, false, true, false)}</div>
        </div>
      </div>
      ${team.roster.slice().sort((a, b) => b.points - a.points).map((p) => `
        <div class="roster-player-row">
          <span class="roster-player-info">
            <span class="roster-player-name">${p.position ? `<span class="pos-badge">${p.position}</span>` : ""}${esc(p.name)}</span>
            ${p.club ? `<span class="club-line">${clubCrest(p.club)}<span class="club-name">${esc(p.club)}</span></span>` : ""}
          </span>
          <div style="text-align:center;"><div class="stat-label">Cost</div>${scoreTile(fmtCost(p.cost || 0), true, false, false, true)}</div>
          <div style="text-align:center;"><div class="stat-label">Season pts</div>${scoreTile(p.points, true, false, !!pulseIds[p.id])}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function fmtCost(n) {
  const num = Number(n) || 0;
  return CURRENCY_SYMBOL + (Number.isInteger(num) ? num : num.toFixed(1)) + "m";
}

function teamNameById(id) {
  const t = data.teams.find((tm) => tm.id === id);
  return t ? t.name : "TBD";
}
function teamColorById(id) {
  const t = data.teams.find((tm) => tm.id === id);
  return t ? t.color : "#999";
}

function renderFixtures() {
  const fixtures = data.fixtures || [];
  if (!fixtures.length) return `<div class="muted">No fixtures added yet.</div>`;
  const weeks = [...new Set(fixtures.map((f) => f.week))].sort((a, b) => a - b);
  return `
    <div class="list-card">
      ${weeks.map((wk) => `
        <div class="list-group-head">Week ${wk}</div>
        ${fixtures.filter((f) => f.week === wk).map((f) => `
          <div class="fixture-row">
            <span class="fixture-team"><span class="dot" style="background:${teamColorById(f.homeTeamId)}"></span>${esc(teamNameById(f.homeTeamId))}</span>
            <span class="fixture-score">${f.homeScore !== null && f.homeScore !== undefined ? f.homeScore : "–"} : ${f.awayScore !== null && f.awayScore !== undefined ? f.awayScore : "–"}</span>
            <span class="fixture-team away">${esc(teamNameById(f.awayTeamId))}<span class="dot" style="background:${teamColorById(f.awayTeamId)};margin-right:0;margin-left:10px;"></span></span>
          </div>
        `).join("")}
      `).join("")}
    </div>
  `;
}

function renderTransfers() {
  const transfers = (data.transfers || []).slice().sort((a, b) => b.week - a.week);
  if (!transfers.length) return `<div class="muted">No transfers logged yet.</div>`;
  return `
    <div class="list-card">
      ${transfers.map((t) => `
        <div class="transfer-row" style="border-top:1px solid var(--line);">
          <div class="transfer-week">Week ${t.week} · ${esc(teamNameById(t.teamId))}</div>
          <div>${t.playerOut ? `${esc(t.playerOut)} <span class="muted" style="margin:0;">out</span> → ` : ""}${esc(t.playerIn)} <span class="muted" style="margin:0;">in</span></div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderCupGames() {
  const games = data.cupGames || [];
  if (!games.length) return `<div class="muted">No cup games added yet.</div>`;
  const rounds = [...new Set(games.map((g) => g.round))];
  return `
    <div class="list-card">
      ${rounds.map((round) => `
        <div class="list-group-head">${esc(round)}</div>
        ${games.filter((g) => g.round === round).map((g) => `
          <div class="fixture-row">
            <span class="fixture-team"><span class="dot" style="background:${teamColorById(g.homeTeamId)}"></span>${esc(teamNameById(g.homeTeamId))}</span>
            <span class="fixture-score">${g.homeScore !== null && g.homeScore !== undefined ? g.homeScore : "–"} : ${g.awayScore !== null && g.awayScore !== undefined ? g.awayScore : "–"}</span>
            <span class="fixture-team away">${esc(teamNameById(g.awayTeamId))}<span class="dot" style="background:${teamColorById(g.awayTeamId)};margin-right:0;margin-left:10px;"></span></span>
          </div>
        `).join("")}
      `).join("")}
    </div>
  `;
}

function renderPrizes() {
  const text = data.prizesText || "";
  return `
    <div class="card">
      <h2 class="card-title">Prizes</h2>
      ${text ? `<div class="prizes-text">${esc(text)}</div>` : `<div class="muted">No prize info added yet.</div>`}
    </div>
  `;
}

function renderHeader() {
  return `
    <header class="header">
      <div class="header-inner">
        <div class="brand" data-action="view-public">
          <div class="brand-mark">⚑</div>
          <div>
            <div class="brand-eyebrow">
              WEEKLY STANDINGS
              ${connectionOk ? '<span class="live-dot" style="width:6px;height:6px;border-radius:50%;background:#D4A537;display:inline-block;"></span>' : ""}
            </div>
            <h1 class="brand-title">${esc(data.leagueName)}</h1>
          </div>
        </div>
        ${view === "admin" ? '<div class="admin-badge">Admin mode</div>' : ""}
      </div>
    </header>
  `;
}

function renderWeekBar(weekOptions) {
  return `
    <div class="week-bar">
      <button class="week-chip ${selectedWeek === null ? "active" : ""}" data-action="select-week" data-week="">Season</button>
      ${weekOptions.map((w) => `<button class="week-chip ${selectedWeek === w ? "active" : ""}" data-action="select-week" data-week="${w}">Wk ${w}</button>`).join("")}
    </div>
  `;
}

function renderTable(teamTotals) {
  return `
    <div class="table-wrap">
      <div class="table-head table-grid">
        <span>#</span><span>Team</span><span style="text-align:right">${selectedWeek ? `Wk ${selectedWeek}` : "Points"}</span>
      </div>
      ${teamTotals.map((team, i) => {
        const isLeader = i === 0 && team.total > 0;
        const isOpen = expandedTeam === team.id;
        return `
          <div class="team-block">
            <button class="team-row row table-grid" data-action="toggle-team" data-team-id="${team.id}">
              <span class="rank-num" style="color:${isLeader ? "#D4A537" : "#17241B"}">${i + 1}</span>
              <span class="team-name-cell">
                <span class="dot" style="background:${team.color}"></span>
                ${esc(team.name)}
                <span class="chev">${isOpen ? "▲" : "▼"}</span>
              </span>
              <span style="display:flex;justify-content:flex-end">${scoreTile(team.total, false, isLeader, false)}</span>
            </button>
            ${isOpen ? `
              <div class="roster">
                ${team.roster.slice().sort((a, b) => b.points - a.points).map((p) => {
                  const isPlayerOpen = expandedPlayer === p.id;
                  return `
                  <button class="roster-row roster-grid row" data-action="toggle-player" data-player-id="${p.id}" style="width:100%;text-align:left;font:inherit;color:inherit;background:${isPlayerOpen ? "rgba(62,124,89,0.1)" : "transparent"};border:none;cursor:pointer;">
                    <span class="roster-name">${p.position ? `<span class="pos-badge">${p.position}</span>` : ""}${esc(p.name)} <span class="chev" style="font-size:10px;">${isPlayerOpen ? "▲" : "▼"}</span></span>
                    <span style="display:flex;justify-content:flex-end">${scoreTile(p.points, true, false, !!pulseIds[p.id])}</span>
                  </button>
                  ${isPlayerOpen ? renderPlayerBreakdown(p) : ""}
                `;
                }).join("")}
              </div>
            ` : ""}
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderPlayerBreakdown(p) {
  const weekly = data.scores[p.id] || {};
  const weekOptions = Array.from({ length: data.totalWeeks }, (_, i) => i + 1);
  return `
    <div class="player-breakdown">
      <div class="player-breakdown-title">${esc(p.name)} · every week</div>
      <div class="player-breakdown-grid">
        ${weekOptions.map((w) => {
          const has = weekly[w] !== undefined;
          return `
            <div class="player-week-cell ${has ? "" : "empty"}">
              <span class="wk-label">Wk ${w}</span>
              <span class="wk-pts">${has ? weekly[w] : "–"}</span>
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function scoreTile(value, small, leader, pulse, isCost) {
  const cls = ["tile", small ? "small" : "", leader ? "leader" : "", pulse ? "pulse" : "", isCost ? "cost" : ""].filter(Boolean).join(" ");
  return `<span class="${cls}">${value}</span>`;
}

function renderFooter() {
  return `
    <footer class="footer">
      <span>${esc(data.leagueName)} · updates live for everyone viewing this page</span>
      ${view === "public" ? '<button class="staff-link" data-action="view-login">🔒 Staff</button>' : ""}
    </footer>
  `;
}

function renderLogin() {
  return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span>🔒</span><h2 class="card-title" style="margin:0">Staff sign-in</h2>
      </div>
      <p class="muted">This gate keeps casual visitors out of the edit screen. It isn't strong security — anyone with the password can make changes, so only share it with people you trust to manage the table.</p>
      <input class="input" type="password" id="pw-input" placeholder="Password" autofocus />
      ${loginError ? `<div class="error-text">${esc(loginError)}</div>` : ""}
      <div style="display:flex;gap:10px;margin-top:14px;">
        <button class="btn-primary" data-action="login-submit">Sign in</button>
        <button class="btn-ghost" data-action="view-public">Cancel</button>
      </div>
    </div>
  `;
}

function renderAdmin(weekOptions) {
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <div class="muted" style="margin-bottom:0">Changes save immediately and are visible to everyone viewing this page.</div>
      <button class="btn-ghost" data-action="exit-admin">↩ Exit admin</button>
    </div>
    ${saveError ? `<div class="error-text" style="margin-bottom:14px;">${esc(saveError)}</div>` : ""}

    <div class="card">
      <h2 class="card-title">League settings</h2>
      <label class="label">League name</label>
      <div class="add-row" style="margin-top:8px;margin-bottom:14px;">
        <input class="input" id="league-name-input" value="${esc(data.leagueName)}" />
      </div>
      <label class="label">Total weeks in season</label>
      <div class="add-row" style="margin-top:8px;">
        <input class="input" id="total-weeks-input" type="number" min="1" max="60" value="${data.totalWeeks}" style="max-width:100px;" />
        <button class="btn-primary-sm" data-action="save-league-settings">💾</button>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">

        <select class="select" id="score-week-select" style="width:auto;">
          ${weekOptions.map((w) => `<option value="${w}" ${w === scoreWeek ? "selected" : ""}>Week ${w}</option>`).join("")}
        </select>
      </div>
      <div>
        ${data.teams.map((team) => `
          <div>
            <div class="group-label"><span class="dot" style="background:${team.color}"></span>${esc(team.name)}</div>
            ${data.players.filter((p) => p.teamId === team.id).map((p) => `
              <div class="score-edit-row">
                <span>${p.position ? `<span class="pos-badge">${p.position}</span>` : ""}${esc(p.name)}</span>
                <input class="score-input" type="number" data-score-input data-player-id="${p.id}"
                  value="${(data.scores[p.id] && data.scores[p.id][scoreWeek] !== undefined) ? data.scores[p.id][scoreWeek] : ""}" />
              </div>
            `).join("")}
          </div>
        `).join("")}
      </div>
      <button class="btn-primary" style="margin-top:14px;" data-action="save-scores">💾 Save Week ${scoreWeek} points</button>
    </div>

    <div class="card">
      <h2 class="card-title">Teams</h2>
      ${data.teams.map((team) => `
        <div class="manage-row">
          <span style="display:flex;align-items:center;gap:8px;"><span class="dot" style="background:${team.color}"></span>${esc(team.name)}</span>
          <button class="icon-btn" data-action="remove-team" data-team-id="${team.id}" aria-label="Remove ${esc(team.name)}">🗑</button>
        </div>
      `).join("")}
      <div class="add-row">
        <input class="input" id="new-team-name" placeholder="New team name" />
        <input class="color-input" type="color" id="new-team-color" value="#3E7C59" aria-label="Team color" />
        <button class="btn-primary-sm" data-action="add-team">+</button>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">Players</h2>
      ${data.teams.map((team) => {
        const roster = data.players.filter((p) => p.teamId === team.id);
        if (!roster.length) return "";
        return `
          <div style="margin-bottom:10px;">
            <div class="group-label"><span class="dot" style="background:${team.color}"></span>${esc(team.name)}</div>
            ${roster.map((p) => `
              <div class="manage-row">
                <span>${p.position ? `<span class="pos-badge">${p.position}</span>` : ""}${esc(p.name)} <span class="muted" style="margin:0;font-size:12px;">${fmtCost(p.cost || 0)}${p.club ? " · " + esc(p.club) : ""}</span></span>
                <button class="icon-btn" data-action="remove-player" data-player-id="${p.id}" aria-label="Remove ${esc(p.name)}">✕</button>
              </div>
            `).join("")}
          </div>
        `;
      }).join("")}
      <div class="add-row">
        <input class="input" id="new-player-name" placeholder="New player name" />
        <select class="select" id="new-player-team" style="width:auto;">
          ${data.teams.map((t) => `<option value="${t.id}">${esc(t.name)}</option>`).join("")}
        </select>
        <select class="select" id="new-player-position" style="width:auto;">
          ${POSITIONS.map((pos) => `<option value="${pos}" ${pos === newPlayerPosition ? "selected" : ""}>${pos}</option>`).join("")}
        </select>
        <input class="input" id="new-player-cost" type="number" step="0.1" placeholder="Cost" style="width:80px;flex:none;" />
        <input class="input" id="new-player-club" placeholder="Club (e.g. Arsenal)" style="width:140px;flex:none;" />
        <button class="btn-primary-sm" data-action="add-player">+</button>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">Import from Excel</h2>
      <p class="muted">Upload an .xlsx (or .csv) file with <strong>Team</strong>, <strong>Player</strong>, <strong>Position</strong>, <strong>Cost</strong>, and <strong>Club</strong> columns to bulk-create teams and players. Add columns named <strong>Week 1</strong>, <strong>Week 2</strong>, etc. to import points for those weeks too. Matching an existing team or player by name updates it instead of duplicating it.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-ghost" data-action="download-template">⬇ Download template</button>

    </div>

    ${renderFixturesAdmin(weekOptions)}
    ${renderTransfersAdmin(weekOptions)}
    ${renderCupGamesAdmin()}
    ${renderPrizesAdmin()}
  `;
}

function renderFixturesAdmin(weekOptions) {
  const fixtures = data.fixtures || [];
  return `
    <div class="card">
      <h2 class="card-title">Fixtures</h2>
      ${fixtures.map((f) => `
        <div class="admin-mini-row">
          <span>Wk ${f.week}: ${esc(teamNameById(f.homeTeamId))} vs ${esc(teamNameById(f.awayTeamId))}</span>
          <div class="admin-mini-inputs">
            <input class="score-mini-input" type="number" data-fixture-home="${f.id}" value="${f.homeScore ?? ""}" placeholder="-" />
            <input class="score-mini-input" type="number" data-fixture-away="${f.id}" value="${f.awayScore ?? ""}" placeholder="-" />
            <button class="icon-btn" data-action="save-fixture-score" data-fixture-id="${f.id}">💾</button>
            <button class="icon-btn" data-action="remove-fixture" data-fixture-id="${f.id}">✕</button>
          </div>
        </div>
      `).join("")}
      <div class="add-row">
        <select class="select" id="new-fixture-week" style="width:auto;">
          ${weekOptions.map((w) => `<option value="${w}">Wk ${w}</option>`).join("")}
        </select>
        <select class="select" id="new-fixture-home" style="width:auto;">
          ${data.teams.map((t) => `<option value="${t.id}">${esc(t.name)}</option>`).join("")}

        <select class="select" id="new-fixture-away" style="width:auto;">
          ${data.teams.map((t) => `<option value="${t.id}">${esc(t.name)}</option>`).join("")}

}

        <select class="select" id="new-transfer-week" style="width:auto;">

        <select class="select" id="new-transfer-team" style="width:auto;">
          ${data.teams.map((t) => `<option value="${t.id}">${esc(t.name)}</option>`).join("")}

        <button class="btn-primary-sm" data-action="add-transfer">+</button>
      </div>
    </div>
  `;
}

  const games = data.cupGames || [];
  return `

      <h2 class="card-title">Cup games</h2>

          ${data.teams.map((t) => `<option value="${t.id}">${esc(t.name)}</option>`).join("")}
        </select>
        <select class="select" id="new-cupgame-away" style="width:auto;">
          ${data.teams.map((t) => `<option value="${t.id}">${esc(t.name)}</option>`).join("")}

        <button class="btn-primary-sm" data-action="add-cupgame">+</button>
      </div>
    </div>
  `;
}

function renderPrizesAdmin() {
  return `
    <div class="card">
      <h2 class="card-title">Prizes</h2>
      <p class="muted">Free text — one line per prize works well.</p>
      <textarea class="input" id="prizes-text-input" rows="5" style="resize:vertical;font-family:inherit;">${esc(data.prizesText || "")}</textarea>
      <button class="btn-primary" style="margin-top:10px;" data-action="save-prizes">💾 Save prizes</button>
    </div>
  `;
}

// ---- Event binding ----
function bindEvents() {
  appEl.querySelectorAll("[data-action]").forEach((el) => {
    el.addEventListener("click", handleAction);
  });
  const weekSelect = document.getElementById("score-week-select");
  if (weekSelect) weekSelect.addEventListener("change", (e) => {
    scoreWeek = Number(e.target.value);
    render();
  });
  const importInput = document.getElementById("import-file-input");
  if (importInput) importInput.addEventListener("change", handleImportFile);
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if (action === "view-public") { view = "public"; render(); }
  else if (action === "set-subview") { subView = el.dataset.subview; render(); }
  else if (action === "select-team-view") { selectedTeamId = el.dataset.teamId; render(); }
  else if (action === "view-login") { view = "login"; loginError = ""; render(); }
  else if (action === "exit-admin") { pauseSync = false; view = "public"; render(); }
  else if (action === "select-week") {
    selectedWeek = el.dataset.week === "" ? null : Number(el.dataset.week);
    render();
  }
  else if (action === "toggle-team") {
    const id = el.dataset.teamId;
    expandedTeam = expandedTeam === id ? null : id;
    expandedPlayer = null;
    render();
  }
  else if (action === "toggle-player") {
    const id = el.dataset.playerId;
    expandedPlayer = expandedPlayer === id ? null : id;
    render();
  }
  else if (action === "login-submit") {
    const pw = document.getElementById("pw-input").value;
    if (pw === ADMIN_PASSWORD) {
      isAdmin = true;
      sessionStorage.setItem("isAdmin", "true");
      view = "admin";
      pauseSync = true;
      scoreWeek = data.currentWeek || 1;
      loginError = "";
    } else {
      loginError = "Incorrect password.";
    }
    render();
  }
  else if (action === "save-scores") {
    const scores = { ...data.scores };
    appEl.querySelectorAll("[data-score-input]").forEach((input) => {
      const playerId = input.dataset.playerId;
      const raw = input.value;
      const num = raw === "" ? 0 : Number(raw);
      scores[playerId] = { ...(scores[playerId] || {}), [scoreWeek]: isNaN(num) ? 0 : num };
      flashPulse(playerId);
    });
    persist({ ...data, scores });
  }
  else if (action === "save-league-settings") {
    const nameInput = document.getElementById("league-name-input");
    const weeksInput = document.getElementById("total-weeks-input");
    const name = nameInput.value.trim();
    const weeks = Math.max(1, Math.min(60, Number(weeksInput.value) || data.totalWeeks));
    if (!name) return;
    persist({ ...data, leagueName: name, totalWeeks: weeks });
  }
  else if (action === "add-team") {
    const nameInput = document.getElementById("new-team-name");
    const colorInput = document.getElementById("new-team-color");
    const name = nameInput.value.trim();
    if (!name) return;
    const next = { ...data, teams: [...data.teams, { id: uid("t"), name, color: colorInput.value }] };
    persist(next);
  }
  else if (action === "remove-team") {
    const teamId = el.dataset.teamId;
    const next = {
      ...data,
      teams: data.teams.filter((t) => t.id !== teamId),
      players: data.players.filter((p) => p.teamId !== teamId),
    };
    persist(next);
  }
  else if (action === "add-player") {
    const nameInput = document.getElementById("new-player-name");
    const teamSelect = document.getElementById("new-player-team");
    const posSelect = document.getElementById("new-player-position");
    const costInput = document.getElementById("new-player-cost");
    const clubInput = document.getElementById("new-player-club");
    const name = nameInput.value.trim();
    if (!name || !teamSelect.value) return;
    newPlayerPosition = posSelect.value;
    const cost = costInput.value === "" ? 0 : Number(costInput.value);
    const next = {
      ...data,
      players: [...data.players, {
        id: uid("p"), teamId: teamSelect.value, name,
        position: posSelect.value, cost: isNaN(cost) ? 0 : cost,
        club: clubInput.value.trim(),
      }],
    };
    persist(next);
  }
  else if (action === "remove-player") {
    const playerId = el.dataset.playerId;
    const scores = { ...data.scores };
    delete scores[playerId];
    persist({ ...data, players: data.players.filter((p) => p.id !== playerId), scores });
  }
  else if (action === "download-template") {
    downloadTemplate();
  }
  else if (action === "trigger-import") {
    document.getElementById("import-file-input").click();
  }
  else if (action === "add-fixture") {
    const week = Number(document.getElementById("new-fixture-week").value);
    const homeTeamId = document.getElementById("new-fixture-home").value;
    const awayTeamId = document.getElementById("new-fixture-away").value;
    if (!homeTeamId || !awayTeamId || homeTeamId === awayTeamId) return;
    const fixtures = [...(data.fixtures || []), { id: uid("f"), week, homeTeamId, awayTeamId, homeScore: null, awayScore: null }];
    persist({ ...data, fixtures });
  }
  else if (action === "remove-fixture") {
    const id = el.dataset.fixtureId;
    persist({ ...data, fixtures: (data.fixtures || []).filter((f) => f.id !== id) });
  }
  else if (action === "save-fixture-score") {
    const id = el.dataset.fixtureId;
    const homeInput = appEl.querySelector(`[data-fixture-home="${id}"]`);
    const awayInput = appEl.querySelector(`[data-fixture-away="${id}"]`);
    const homeScore = homeInput.value === "" ? null : Number(homeInput.value);
    const awayScore = awayInput.value === "" ? null : Number(awayInput.value);
    const fixtures = (data.fixtures || []).map((f) => f.id === id ? { ...f, homeScore, awayScore } : f);
    persist({ ...data, fixtures });
  }
  else if (action === "add-transfer") {
    const week = Number(document.getElementById("new-transfer-week").value);
    const teamId = document.getElementById("new-transfer-team").value;
    const playerOut = document.getElementById("new-transfer-out").value.trim();
    const playerIn = document.getElementById("new-transfer-in").value.trim();
    if (!teamId || !playerIn) return;
    const transfers = [...(data.transfers || []), { id: uid("tr"), week, teamId, playerOut, playerIn }];
    persist({ ...data, transfers });
  }
  else if (action === "remove-transfer") {
    const id = el.dataset.transferId;
    persist({ ...data, transfers: (data.transfers || []).filter((t) => t.id !== id) });
  }
  else if (action === "add-cupgame") {
    const round = document.getElementById("new-cupgame-round").value.trim();
    const homeTeamId = document.getElementById("new-cupgame-home").value;
    const awayTeamId = document.getElementById("new-cupgame-away").value;
    if (!round || !homeTeamId || !awayTeamId || homeTeamId === awayTeamId) return;
    const cupGames = [...(data.cupGames || []), { id: uid("c"), round, homeTeamId, awayTeamId, homeScore: null, awayScore: null }];
    persist({ ...data, cupGames });
  }
  else if (action === "remove-cupgame") {
    const id = el.dataset.cupgameId;
    persist({ ...data, cupGames: (data.cupGames || []).filter((g) => g.id !== id) });
  }
  else if (action === "save-cupgame-score") {
    const id = el.dataset.cupgameId;
    const homeInput = appEl.querySelector(`[data-cupgame-home="${id}"]`);
    const awayInput = appEl.querySelector(`[data-cupgame-away="${id}"]`);
    const homeScore = homeInput.value === "" ? null : Number(homeInput.value);
    const awayScore = awayInput.value === "" ? null : Number(awayInput.value);
    const cupGames = (data.cupGames || []).map((g) => g.id === id ? { ...g, homeScore, awayScore } : g);
    persist({ ...data, cupGames });
  }
  else if (action === "save-prizes") {
    const text = document.getElementById("prizes-text-input").value;
    persist({ ...data, prizesText: text });
  }
}

function downloadTemplate() {
  const headers = ["Team", "Player", "Position", "Cost", "Club", "Week 1", "Week 2", "Week 3"];
  const sample = [
    ["Harbor FC", "J. Okafor", "FWD", 8.5, "Arsenal", 14, 9, 11],
    ["Harbor FC", "M. Reyes", "MID", 6.0, "Chelsea", 7, 11, 8],
    ["Ironside", "S. Kowalski", "GK", 5.0, "Man City", 12, 12, 10],
  ];
  const ws = XLSX.utils.aoa_to_sheet([headers, ...sample]);
  ws["!cols"] = [{ wch: 16 }, { wch: 18 }, { wch: 10 }, { wch: 8 }, { wch: 14 }, { wch: 8 }, { wch: 8 }, { wch: 8 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Roster");
  XLSX.writeFile(wb, "league-import-template.xlsx");
}

function handleImportFile(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  importing = true;
  importStatus = null;
  render();

  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const wb = XLSX.read(evt.target.result, { type: "array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      if (!rows.length) {
        importStatus = { type: "error", message: "That file doesn't have any rows to import." };
        importing = false;
        render();
        return;
      }
      const keys = Object.keys(rows[0]);
      const findKey = (target) => keys.find((k) => k.trim().toLowerCase() === target);
      const teamKey = findKey("team");
      const playerKey = findKey("player") || findKey("name");
      const posKey = findKey("position") || findKey("pos");
      const costKey = findKey("cost") || findKey("price") || findKey("value");
      const clubKey = findKey("club") || findKey("real team") || findKey("realteam");
      const weekKeys = keys.filter((k) => /^week\s*\d+$/i.test(k.trim()));

      if (!teamKey || !playerKey) {
        importStatus = { type: "error", message: "Couldn't find 'Team' and 'Player' columns. Use the template for the right headers." };
        importing = false;
        render();
        return;
      }

      let teams = [...data.teams];
      let players = [...data.players];
      let scores = { ...data.scores };
      let teamsAdded = 0, playersAdded = 0, playersUpdated = 0;
      const palette = ["#3E7C59", "#8A5A44", "#3B4A7A", "#B5482A", "#6B7F3E", "#5A4A8A"];

      rows.forEach((row) => {
        const teamName = String(row[teamKey] || "").trim();
        const playerName = String(row[playerKey] || "").trim();
        if (!teamName || !playerName) return;

        let team = teams.find((t) => t.name.toLowerCase() === teamName.toLowerCase());
        if (!team) {
          team = { id: uid("t"), name: teamName, color: palette[teamsAdded % palette.length] };
          teams.push(team);
          teamsAdded++;
        }

        let position = posKey ? String(row[posKey] || "").trim().toUpperCase() : "";
        if (!POSITIONS.includes(position)) position = "MID";

        let cost = 0;
        if (costKey) {
          const rawCost = Number(row[costKey]);
          cost = isNaN(rawCost) ? 0 : rawCost;
        }
        const club = clubKey ? String(row[clubKey] || "").trim() : "";

        let player = players.find((p) => p.teamId === team.id && p.name.toLowerCase() === playerName.toLowerCase());
        if (!player) {
          player = { id: uid("p"), teamId: team.id, name: playerName, position, cost, club };
          players.push(player);
          playersAdded++;
        } else {
          player.position = position;
          if (costKey) player.cost = cost;
          if (clubKey) player.club = club;
          playersUpdated++;
        }

        weekKeys.forEach((wk) => {
          const weekNum = parseInt(wk.match(/\d+/)[0], 10);
          const raw = row[wk];
          if (raw === "" || raw === null || raw === undefined) return;
          const num = Number(raw);
          if (isNaN(num)) return;
          scores[player.id] = { ...(scores[player.id] || {}), [weekNum]: num };
        });
      });

      const maxWeekFromFile = weekKeys.reduce((max, wk) => Math.max(max, parseInt(wk.match(/\d+/)[0], 10)), 0);

      const next = { ...data, teams, players, scores, totalWeeks: Math.max(data.totalWeeks, maxWeekFromFile) };
      persist(next);
      importStatus = {
        type: "ok",
        message: `Imported: ${teamsAdded} new team${teamsAdded === 1 ? "" : "s"}, ${playersAdded} new player${playersAdded === 1 ? "" : "s"}${playersUpdated ? `, ${playersUpdated} player${playersUpdated === 1 ? "" : "s"} updated` : ""}.`,
      };
    } catch (err) {
      importStatus = { type: "error", message: "Couldn't read that file. Make sure it's a .xlsx or .csv export." };
    } finally {
      importing = false;
      const input = document.getElementById("import-file-input");
      if (input) input.value = "";
      render();
    }
  };
  reader.readAsArrayBuffer(file);
}

// Restore admin session if the tab already signed in
if (isAdmin) { view = "admin"; pauseSync = true; scoreWeek = 1; }
