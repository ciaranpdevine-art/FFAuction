  function showFatalError(msg) {
    var el = document.getElementById("app");
    el.className = "center-msg";
    el.innerHTML =
      '<div style="max-width:340px;text-align:left;padding:20px;font-family:sans-serif;">' +

      '<div style="font-size:13px;color:#71695A;line-height:1.5;">' + msg + '</div>' +
      '</div>';
  }
  window.addEventListener("error", function (e) {
    showFatalError("Script error: " + (e.message || "unknown error") + (e.filename ? " (" + e.filename.split("/").pop() + ":" + e.lineno + ")" : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    showFatalError("Unhandled error: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
  });
  setTimeout(function () {
    var el = document.getElementById("app");
    if (el && el.textContent.indexOf("Loading table") !== -1) {
      showFatalError(
        "Still loading after 10 seconds with no error reported — this usually means the connection to the Firebase library or your database timed out. Check your internet connection, and double-check the Firestore database was created in the Firebase console."

  // Legacy squads stored plain ids; new squads store {id, cost} so the same

function getSquadEntries(d, team) {
  if (Array.isArray(team.squad)) return team.squad.map(normalizeSquadEntry);
  // Pre-squad-builder teams: fall back to players still tagged with this teamId.
  return d.players.filter((p) => p.teamId === team.id).map((p) => ({ id: p.id, cost: null }));
}

// Ownership history is the source of truth for "who earned whose points, when."
// Teams set up via Squad builder don't have explicit history yet — this treats
// their current squad as "owned since week 1" so nothing changes for existing
// leagues until a transfer window actually moves a player.
function getAllOwnershipEntries(d) {
  const explicit = d.ownership || [];
  const covered = new Set(explicit.map((o) => o.teamId + ":" + o.playerId));
  const synthesized = [];
  d.teams.forEach((team) => {
    getSquadEntries(d, team).forEach((entry) => {
      const key = team.id + ":" + entry.id;
      if (!covered.has(key)) {
        synthesized.push({ id: "synth-" + key, playerId: entry.id, teamId: team.id, fromWeek: 1, toWeek: null, cost: entry.cost });
      }
    });
  });
  return [...explicit, ...synthesized];
}

function getTeamRosterIds(d, team) {
  return getAllOwnershipEntries(d).filter((o) => o.teamId === team.id && o.toWeek === null).map((o) => o.playerId);
}

function findOwningTeam(d, playerId) {
  const entry = getAllOwnershipEntries(d).find((o) => o.playerId === playerId && o.toWeek === null);
  return entry ? d.teams.find((t) => t.id === entry.teamId) : undefined;
}

function computeTeamTotals(d, week) {
  const allOwnership = getAllOwnershipEntries(d);
  const totals = d.teams.map((team) => {
    const teamOwnership = allOwnership.filter((o) => o.teamId === team.id);
    let total = 0;
    let roster;

    if (week) {
      // A specific gameweek: only whoever owned the player during that exact week counts.
      const covering = teamOwnership.filter((o) => o.fromWeek <= week && (o.toWeek === null || week <= o.toWeek));
      roster = covering.map((o) => {
        const p = d.players.find((pp) => pp.id === o.playerId);
        if (!p) return null;
        const pts = (d.scores[o.playerId] || {})[week] || 0;
        total += pts;
        const cost = o.cost !== null && o.cost !== undefined ? o.cost : (p.cost || 0);
        return { ...p, points: pts, cost };
      }).filter(Boolean);
    } else {
      // Season total: every week's points go to whoever owned the player that week —
      // including players since sold, so a team keeps credit for points already banked.
      teamOwnership.forEach((o) => {
        const from = Math.max(1, o.fromWeek);
        const to = o.toWeek === null ? d.totalWeeks : Math.min(d.totalWeeks, o.toWeek);
        for (let w = from; w <= to; w++) total += (d.scores[o.playerId] || {})[w] || 0;
      });
      // But the visible roster only lists currently-owned players, each showing
      // points earned only from when THIS team signed them onward.
      const current = teamOwnership.filter((o) => o.toWeek === null);
      roster = current.map((o) => {
        const p = d.players.find((pp) => pp.id === o.playerId);
        if (!p) return null;
        let pts = 0;
        for (let w = Math.max(1, o.fromWeek); w <= d.totalWeeks; w++) pts += (d.scores[o.playerId] || {})[w] || 0;
        const cost = o.cost !== null && o.cost !== undefined ? o.cost : (p.cost || 0);
        return { ...p, points: pts, cost };
      }).filter(Boolean);
    }
    return { ...team, roster, total };
  });
  totals.sort((a, b) => b.total - a.total);
  return totals;
}

// ---- Render ----
function render() {
  if (!data) { appEl.className = "center-msg"; appEl.textContent = "Loading table…"; return; }
  appEl.className = "page";
  document.title = data.leagueName + " — Weekly Standings";

  // Remember horizontal scroll position of tab/chip bars so a full re-render
  // (which rebuilds the whole DOM) doesn't snap them back to the start.
  appEl.querySelectorAll("[data-scroll-id]").forEach((el) => {
    scrollPositions[el.dataset.scrollId] = el.scrollLeft;
  });

  // Remember which text input (if any) was focused, so live-filtering inputs
  // like search don't lose focus/cursor position on every keystroke.
  const active = document.activeElement;
  const activeId = active && active.id && (active.tagName === "INPUT" || active.tagName === "TEXTAREA") ? active.id : null;
  const activeSelStart = activeId ? active.selectionStart : null;
  const activeSelEnd = activeId ? active.selectionEnd : null;

  const teamTotals = computeTeamTotals(data, selectedWeek);
  const seasonTotals = computeTeamTotals(data, null);
  const weekOptions = Array.from({ length: data.totalWeeks }, (_, i) => i + 1);
  if (!selectedTeamId && data.teams.length) selectedTeamId = data.teams[0].id;
  if (subView === "rumper" && !(data.rumperLeague && data.rumperLeague.enabled)) subView = "table";

  appEl.innerHTML = `
    ${renderHeader()}
    <main class="main">
      ${view !== "admin" ? renderModeToggle() : ""}
      ${view === "public" && subView === "table" ? renderWeekBar(weekOptions) + renderTable(teamTotals) : ""}
      ${view === "public" && subView === "rumper" ? renderRumperLeague() : ""}
      ${view === "public" && subView === "teams" ? renderTeamSelectBar() + renderRosterCard(seasonTotals) : ""}
      ${view === "public" && subView === "players" ? renderPlayerList() : ""}
      ${view === "public" && subView === "fixtures" ? renderFixtures() : ""}
      ${view === "public" && subView === "transfers" ? renderTransfers() : ""}
      ${view === "public" && subView === "cup" ? renderCupGames() : ""}
      ${view === "public" && subView === "prizes" ? renderPrizes() : ""}
      ${view === "login" ? renderLogin() : ""}
      ${view === "admin" ? renderAdmin(weekOptions) : ""}
    </main>
    ${renderFooter()}
  `;
  bindEvents();

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (activeSelStart !== null && typeof el.setSelectionRange === "function") {
        try { el.setSelectionRange(activeSelStart, activeSelEnd); } catch (e) {}
      }
    }
  }
}

function renderModeToggle() {
  const rumperEnabled = data.rumperLeague && data.rumperLeague.enabled;
  const tabs = [
    ["table", "League table"],
    ...(rumperEnabled ? [["rumper", "Rumper League"]] : []),
    ["teams", "Team View"],
    ["players", "Player List"],
    ["fixtures", "Fixtures"],
    ["transfers", "Transfers"],
    ["cup", "Cup games"],
    ["prizes", "Prizes"],
  ];
  return `
    <div class="mode-toggle" data-scroll-id="nav-tabs">
      ${tabs.map(([key, label]) => `<button class="mode-btn ${subView === key ? "active" : ""}" data-action="set-subview" data-subview="${key}">${label}</button>`).join("")}
    </div>
  `;
}

function renderTeamSelectBar() {
  return `
    <div class="team-select-bar" data-scroll-id="teamview-chips">
      ${data.teams.map((t) => `
        <button class="team-chip ${selectedTeamId === t.id ? "active" : ""}" data-action="select-team-view" data-team-id="${t.id}">
          ${esc(t.name)}
        </button>
      `).join("")}
    </div>
  `;
}

function getPlayerSeasonPoints(playerId) {
  const weekly = data.scores[playerId] || {};
  return Object.values(weekly).reduce((a, b) => a + b, 0);
}

function renderPlayerList() {
  const filters = [
    ["all", "All"],
    ["available", "Available"],
    ["unavailable", "Unavailable"],
  ];
  const filterBar = `
    <div class="week-bar" data-scroll-id="player-filter">
      ${filters.map(([key, label]) => `<button class="week-chip ${playerListFilter === key ? "active" : ""}" data-action="set-player-filter" data-filter="${key}">${label}</button>`).join("")}
    </div>
  `;

  const positionFilters = ["ALL", ...POSITIONS];
  const positionFilterBar = `
    <div class="week-bar" data-scroll-id="player-position-filter">
      ${positionFilters.map((pos) => `<button class="week-chip ${playerPositionFilter === pos ? "active" : ""}" data-action="set-player-position-filter" data-position="${pos}">${pos === "ALL" ? "All positions" : pos}</button>`).join("")}
    </div>
  `;

  const searchBar = `
    <div style="padding:0 0 12px 0;">
      <input class="input" id="player-search-input" placeholder="Search players…" value="${esc(playerSearchQuery)}" />
    </div>
  `;

  const filtered = data.players.filter((p) => {
    const owner = findOwningTeam(data, p.id);
    if (playerListFilter === "available" && owner) return false;
    if (playerListFilter === "unavailable" && !owner) return false;
    if (playerPositionFilter !== "ALL" && p.position !== playerPositionFilter) return false;
    if (playerSearchQuery && !p.name.toLowerCase().includes(playerSearchQuery.toLowerCase())) return false;
    return true;
  });

  if (!filtered.length) {
    return filterBar + positionFilterBar + searchBar + `<div class="muted">No players match this filter.</div>`;
  }

  const body = POSITIONS.map((pos) => {
    const inPos = filtered.filter((p) => p.position === pos);
    if (!inPos.length) return "";
    return `
      <div class="list-group-head">${pos} <span style="font-weight:400;">(${inPos.length})</span></div>
      ${inPos.slice().sort((a, b) => getPlayerSeasonPoints(b.id) - getPlayerSeasonPoints(a.id)).map((p) => {
        const owner = findOwningTeam(data, p.id);
        const seasonPts = getPlayerSeasonPoints(p.id);
        return `
          <div class="manage-row" style="padding:10px 16px;">
            <span>${esc(p.name)}${p.club ? ` <span class="muted" style="margin:0;font-size:12px;">· ${esc(p.club)}</span>` : ""}</span>
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="text-align:center;"><div class="stat-label">Season pts</div>${scoreTile(seasonPts, true, false, false)}</div>
              ${owner
                ? `<span style="font-size:12px;font-weight:700;color:var(--pitch);">${esc(owner.name)}</span>`
                : `<span style="font-size:12px;font-weight:700;color:var(--turf);">Available</span>`}
            </div>
          </div>
        `;
      }).join("")}
    `;
  }).join("");

  return filterBar + positionFilterBar + searchBar + `<div class="list-card">${body}</div>`;
}

function getNextFixtureForClub(club, week) {
  if (!club) return null;
  const fixtures = data.fixtures || [];
  const match = fixtures.find((f) =>
    f.week === week &&
    (f.homeClub.toLowerCase() === club.toLowerCase() || f.awayClub.toLowerCase() === club.toLowerCase())
  );
  if (!match) return null;
  const isHome = match.homeClub.toLowerCase() === club.toLowerCase();
  return { opponent: isHome ? match.awayClub : match.homeClub, isHome };
}

function getAllTeamsWeeklyPositions(d) {
  const weekly = d.teams.map((team) => ({ id: team.id, points: getTeamWeeklyPoints(d, team) }));
  const positions = {};
  for (let w = 1; w <= d.totalWeeks; w++) {
    const standings = weekly.map((t) => ({
      id: t.id,
      cum: (t.points[w - 1] ? t.points[w - 1].cumulative : 0),
    }));
    standings.sort((a, b) => b.cum - a.cum);
    standings.forEach((s, idx) => {
      if (!positions[s.id]) positions[s.id] = [];
      positions[s.id].push({ week: w, position: idx + 1 });
    });
  }
  return positions;
}

function getTeamWeeklyPoints(d, team) {
  const allOwnership = getAllOwnershipEntries(d);
  const teamOwnership = allOwnership.filter((o) => o.teamId === team.id);
  const points = [];
  let cumulative = 0;
  for (let w = 1; w <= d.totalWeeks; w++) {
    let weekPts = 0;
    teamOwnership.forEach((o) => {
      if (o.fromWeek <= w && (o.toWeek === null || w <= o.toWeek)) {
        weekPts += (d.scores[o.playerId] || {})[w] || 0;
      }
    });
    cumulative += weekPts;
    points.push({ week: w, cumulative });
  }
  return points;
}

function computeRumperStandings(d) {
  const settings = d.rumperLeague || { startWeek: 27, endWeek: 38, excludedTeamIds: [] };
  const excluded = new Set(settings.excludedTeamIds || []);
  const allOwnership = getAllOwnershipEntries(d);
  const eligible = d.teams.filter((t) => !excluded.has(t.id));
  const standings = eligible.map((team) => {
    const teamOwnership = allOwnership.filter((o) => o.teamId === team.id);
    let total = 0;
    for (let w = settings.startWeek; w <= Math.min(settings.endWeek, d.totalWeeks); w++) {
      teamOwnership.forEach((o) => {
        if (o.fromWeek <= w && (o.toWeek === null || w <= o.toWeek)) {
          total += (d.scores[o.playerId] || {})[w] || 0;
        }
      });
    }
    return { ...team, total };
  });
  standings.sort((a, b) => b.total - a.total);
  return standings;
}

function renderRumperLeague() {
  const settings = data.rumperLeague || { startWeek: 27, endWeek: 38, excludedTeamIds: [] };
  const excludedNames = (settings.excludedTeamIds || []).map((id) => teamNameById(id));
  const standings = computeRumperStandings(data);
  const started = data.totalWeeks >= settings.startWeek;

  return `
    <div class="card">
      <h2 class="card-title">Rumper League</h2>
      <p class="muted">Counts only points from Week ${settings.startWeek} to Week ${settings.endWeek}.</p>
      ${excludedNames.length ? `<p class="muted" style="margin-bottom:0;">Not eligible: <strong>${excludedNames.map((n) => esc(n)).join(", ")}</strong></p>` : ""}
    </div>
    ${!started ? `<div class="muted">The Rumper League hasn't started yet — it begins at Week ${settings.startWeek}.</div>` : `
      <div class="table-wrap">
        <div class="table-head table-grid">
          <span>#</span><span>Team</span><span style="text-align:right">Points</span>
        </div>
        ${standings.map((team, i) => `
          <div class="team-block">
            <div class="team-row row table-grid" style="cursor:default;">
              <span class="rank-num" style="color:${i === 0 && team.total > 0 ? "#D4A537" : "#17241B"}">${i + 1}</span>
              <span class="team-name-cell">${esc(team.name)}</span>
              <span style="display:flex;justify-content:flex-end">${scoreTile(team.total, false, i === 0 && team.total > 0, false)}</span>
            </div>
          </div>
        `).join("")}
      </div>
    `}
  `;
}

function renderPositionChart(team) {
  const allPositions = getAllTeamsWeeklyPositions(data);
  const points = allPositions[team.id] || [];
  if (!points.length) return "";
  const maxPos = Math.max(1, data.teams.length);
  const w = 300, h = 110, padL = 22, padB = 18, padT = 10, padR = 6;
  const stepX = (w - padL - padR) / Math.max(1, points.length - 1);
  const scaleY = (pos) => padT + (h - padT - padB) * ((pos - 1) / Math.max(1, maxPos - 1));
  const coords = points.map((p, i) => [padL + i * stepX, scaleY(p.position)]);
  const path = coords.map((c, i) => (i === 0 ? "M" : "L") + c[0].toFixed(1) + "," + c[1].toFixed(1)).join(" ");
  const dots = coords.map((c) => `<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="2.5" fill="#234D35" />`).join("");
  const xLabels = points.filter((p, i) => i === 0 || i === points.length - 1 || (i + 1) % 5 === 0)
    .map((p) => {
      const i = points.indexOf(p);
      return `<text x="${(padL + i * stepX).toFixed(1)}" y="${h - 3}" font-size="8" fill="#71695A" text-anchor="middle">Wk${p.week}</text>`;
    }).join("");
  return `
    <div style="padding:14px 16px;border-top:1px solid var(--line);">
      <div class="stat-label" style="text-align:left;margin-bottom:6px;">League position by week</div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;">
        <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${h - padB}" stroke="#DED5C0" stroke-width="1" />
        <line x1="${padL}" y1="${h - padB}" x2="${w - padR}" y2="${h - padB}" stroke="#DED5C0" stroke-width="1" />
        <text x="${padL - 4}" y="${padT + 4}" font-size="8" fill="#71695A" text-anchor="end">1st</text>
        <text x="${padL - 4}" y="${h - padB}" font-size="8" fill="#71695A" text-anchor="end">${maxPos}${maxPos === 1 ? "st" : "th"}</text>
        <path d="${path}" fill="none" stroke="#3E7C59" stroke-width="2" />
        ${dots}
        ${xLabels}
      </svg>
    </div>
  `;
}

function renderRosterCard(seasonTotals) {
  const team = seasonTotals.find((t) => t.id === selectedTeamId) || seasonTotals[0];
  if (!team) return `<div class="muted">No teams yet.</div>`;
  const totalCost = team.roster.reduce((sum, p) => sum + (p.cost || 0), 0);
  const budget = data.budgetPerTeam ?? 100;
  const remaining = budget - totalCost;
  const formation = team.formation || "442";
  const leaguePosition = seasonTotals.findIndex((t) => t.id === team.id) + 1;
  return `
    <div class="roster-card">
      <div class="roster-card-head">
        <div class="roster-card-title-row">
          <span class="roster-card-title">${esc(team.name)}</span>
          <span class="pos-badge" style="flex-shrink:0;">${formation.split("").join("-")}</span>
        </div>
        <div class="roster-totals">
          <div><div class="stat-label">League pos</div>${scoreTile("#" + leaguePosition, true, leaguePosition === 1, false)}</div>
          <div><div class="stat-label">Season pts</div>${scoreTile(team.total, true, false, false)}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-around;padding:12px 16px;background:#F4EFE4;border-top:1px solid var(--line);">
        <div style="text-align:center;"><div class="stat-label">Spent</div>${scoreTile(fmtCost(totalCost), true, false, false, true)}</div>
        <div style="text-align:center;"><div class="stat-label">Remaining budget</div>${scoreTile(fmtCost(remaining), true, remaining < 0, false, remaining >= 0)}</div>
      </div>
      ${renderPositionChart(team)}
      <div style="padding:10px 16px;border-top:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;">Next fixtures · Gameweek ${data.totalWeeks}</div>
      ${sortRoster(team.roster).map((p) => {
        const nextFixture = getNextFixtureForClub(p.club, data.totalWeeks);
        return `
        <div class="roster-player-row">
          <span class="roster-player-info">
            <span class="roster-player-name">${p.position ? `<span class="pos-badge">${p.position}</span>` : ""}${esc(p.name)}</span>
            ${p.club ? `<span class="club-line"><span class="club-name">${esc(p.club)}</span></span>` : ""}
            ${nextFixture ? `<span class="club-line" style="color:var(--turf);font-size:11.5px;font-weight:600;">vs ${esc(nextFixture.opponent)} ${nextFixture.isHome ? "(H)" : "(A)"}</span>` : ""}
          </span>
          <div style="text-align:center;"><div class="stat-label">Cost</div>${scoreTile(fmtCost(p.cost || 0), true, false, false, true)}</div>
          <div style="text-align:center;"><div class="stat-label">Season pts</div>${scoreTile(p.points, true, false, !!pulseIds[p.id])}</div>
        </div>
      `;
      }).join("")}
    </div>
  `;
}

function fmtCost(n) {
  const num = Number(n) || 0;
  return CURRENCY_SYMBOL + (Number.isInteger(num) ? num : num.toFixed(1)) + "m";
}

function teamNameById(id) {
  const t = data.teams.find((tm) => tm.id === id);
  return t ? t.name : "TBD";
}

let selectedFixtureWeek = 1;

function fmtFixtureDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString(undefined, { weekday: "short", day: "numeric", month: "short" });
}

function renderFixtures() {
  const fixtures = data.fixtures || [];
  const weekOptions = Array.from({ length: FIXTURE_WEEKS }, (_, i) => i + 1);
  const weekBar = `
    <div class="week-bar" data-scroll-id="fixtures-weekbar">
      ${weekOptions.map((w) => `<button class="week-chip ${selectedFixtureWeek === w ? "active" : ""}" data-action="select-fixture-week" data-week="${w}">Wk ${w}</button>`).join("")}
    </div>
  `;

  const thisWeek = fixtures.filter((f) => f.week === selectedFixtureWeek)
    .slice()
    .sort((a, b) => (a.date || "").localeCompare(b.date || ""));

  if (!thisWeek.length) {
    return weekBar + `<div class="muted">No fixtures added yet for Week ${selectedFixtureWeek}.</div>`;
  }

  return weekBar + `
    <div class="list-card">
      ${thisWeek.map((f) => `
        <div class="fixture-row">
          <span class="fixture-team">${esc(f.homeClub)}</span>
          <span class="fixture-score">${(f.homeScore !== null && f.homeScore !== undefined) || (f.awayScore !== null && f.awayScore !== undefined) ? `${f.homeScore ?? "–"} : ${f.awayScore ?? "–"}` : "v"}</span>
          <span class="fixture-team away">${esc(f.awayClub)}</span>
        </div>
        ${f.date ? `<div class="transfer-week" style="padding:0 16px 10px 16px;">${esc(fmtFixtureDate(f.date))}</div>` : ""}
      `).join("")}
    </div>
  `;
}

let selectedTransfersViewTeamId = null;

function transferWindowName(windowId) {

function renderTransfers() {
  if (!selectedTransfersViewTeamId && data.teams.length) selectedTransfersViewTeamId = data.teams[0].id;

function getTopScorer(week) {
  let best = null;
  data.players.forEach((p) => {
    const pts = week ? ((data.scores[p.id] || {})[week] || 0) : getPlayerSeasonPoints(p.id);
    if (!best || pts > best.points) best = { player: p, points: pts };
  });
  if (!best || best.points <= 0) return null;
  const owner = findOwningTeam(data, best.player.id);
  return { ...best, teamName: owner ? owner.name : null };
}

function renderSquadBuilder() {
  if (!selectedSquadTeamId) return `<div class="muted">Pick a team above to build its squad.</div>`;
  const team = data.teams.find((t) => t.id === selectedSquadTeamId);
  if (!team) return "";
  const formation = team.formation || "442";
  const counts = FORMATIONS[formation];
  const entries = getSquadEntries(data, team);

  const takenByOthers = new Set();
  data.teams.forEach((t) => {
    if (t.id === team.id) return;
    getSquadEntries(data, t).forEach((e) => takenByOthers.add(e.id));
  });

  const spend = entries.reduce((sum, e) => {
    const p = data.players.find((pp) => pp.id === e.id);
    const cost = e.cost !== null && e.cost !== undefined ? e.cost : (p && p.cost) || 0;
    return sum + cost;
  }, 0);

  let slotsHtml = "";
  POSITIONS.forEach((pos) => {
    const n = counts[pos] || 0;
    if (!n) return;
    const currentForPos = entries.filter((e) => {
      const p = data.players.find((pp) => pp.id === e.id);
      return p && p.position === pos;
    });
    slotsHtml += `<div class="group-label">${pos}</div>`;
    for (let i = 0; i < n; i++) {
      const currentEntry = currentForPos[i];
      const currentId = currentEntry ? currentEntry.id : "";
      const currentCost = currentEntry && currentEntry.cost !== null && currentEntry.cost !== undefined ? currentEntry.cost : "";
      const eligible = data.players.filter((p) => p.position === pos && (!takenByOthers.has(p.id) || p.id === currentId));
      slotsHtml += `
        <div style="display:flex;gap:6px;margin-bottom:6px;">
          <select class="select squad-slot" data-slot-pos="${pos}" style="flex:1;">
            <option value="">— empty —</option>
            ${eligible.map((p) => `<option value="${p.id}" ${p.id === currentId ? "selected" : ""}>${esc(p.name)}${p.club ? " (" + esc(p.club) + ")" : ""}</option>`).join("")}
          </select>
          <input class="score-mini-input squad-slot-cost" type="number" step="0.1" placeholder="Cost" value="${currentCost}" style="width:72px;" />
        </div>
      `;
    }
  });

  const budget = data.budgetPerTeam ?? 100;
  const remaining = budget - spend;

  return `
    <div class="mode-toggle" data-scroll-id="formation-toggle" style="margin-bottom:14px;">
      ${Object.keys(FORMATIONS).map((f) => `<button class="mode-btn ${formation === f ? "active" : ""}" data-action="set-formation" data-formation="${f}">${f}</button>`).join("")}
    </div>
    <div style="display:flex;gap:16px;align-items:center;margin-bottom:10px;">
      <div><div class="stat-label">Spent</div>${scoreTile(fmtCost(spend), true, false, false, true)}</div>
      <div><div class="stat-label">Remaining</div>${scoreTile(fmtCost(remaining), true, remaining < 0, false, remaining >= 0)}</div>
    </div>
    <div id="squad-slots">${slotsHtml}</div>
    <button class="btn-primary" style="margin-top:6px;" data-action="save-squad">💾 Save squad</button>
  `;
}

      ${importStatus ? `<div class="status-banner ${importStatus.type === "ok" ? "status-ok" : "status-error"}">${importStatus.type === "ok" ? "✓" : "⚠"} <span>${esc(importStatus.message)}</span></div>` : ""}

    ${renderFixturesAdmin(weekOptions)}

    ${renderCupGamesAdmin()}
    ${renderPrizesAdmin()}
  `;
}

// ---- Event binding ----
function bindEvents() {
  appEl.querySelectorAll("[data-action]").forEach((el) => {
    el.addEventListener("click", handleAction);
  });
  appEl.querySelectorAll("[data-scroll-id]").forEach((el) => {
    const id = el.dataset.scrollId;
    if (scrollPositions[id]) el.scrollLeft = scrollPositions[id];
    el.addEventListener("scroll", () => { scrollPositions[id] = el.scrollLeft; });
  });
  const weekSelect = document.getElementById("score-week-select");
  if (weekSelect) weekSelect.addEventListener("change", (e) => {
    scoreWeek = Number(e.target.value);
    render();
  });
  const importInput = document.getElementById("import-file-input");
  if (importInput) importInput.addEventListener("change", handleImportFile);
  const importFixturesInput = document.getElementById("import-fixtures-input");
  if (importFixturesInput) importFixturesInput.addEventListener("change", handleImportFixturesFile);
  const transferWindowSelect = document.getElementById("transfer-window-select");
  if (transferWindowSelect) transferWindowSelect.addEventListener("change", (e) => {
    selectedTransferWindowId = e.target.value;
  });
  const transferTeamSelect = document.getElementById("transfer-team-select");
  if (transferTeamSelect) transferTeamSelect.addEventListener("change", (e) => {
    selectedTransferTeamId = e.target.value;
    render();
  });
  const playerSearchInput = document.getElementById("player-search-input");
  if (playerSearchInput) playerSearchInput.addEventListener("input", (e) => {
    playerSearchQuery = e.target.value;
    render();
  });
  const weeklyPointsWeekSelect = document.getElementById("weekly-points-import-week");
  if (weeklyPointsWeekSelect) weeklyPointsWeekSelect.addEventListener("change", (e) => {
    weeklyPointsImportWeek = Number(e.target.value);
  });
  const weeklyPointsImportInput = document.getElementById("import-weekly-points-input");
  if (weeklyPointsImportInput) weeklyPointsImportInput.addEventListener("change", handleImportWeeklyPointsFile);
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if (action === "view-public") { view = "public"; render(); }
  else if (action === "set-subview") { subView = el.dataset.subview; render(); }
  else if (action === "select-team-view") { selectedTeamId = el.dataset.teamId; render(); }
  else if (action === "select-transfers-team") { selectedTransfersViewTeamId = el.dataset.teamId; render(); }
  else if (action === "set-player-filter") { playerListFilter = el.dataset.filter; render(); }
  else if (action === "set-player-position-filter") { playerPositionFilter = el.dataset.position; render(); }
  else if (action === "view-login") { view = "login"; loginError = ""; render(); }
  else if (action === "exit-admin") { pauseSync = false; view = "public"; render(); }
  else if (action === "select-week") {
    selectedWeek = el.dataset.week === "" ? null : Number(el.dataset.week);
    render();
  }
  else if (action === "select-fixture-week") {
    selectedFixtureWeek = Number(el.dataset.week);
    render();
  }
  else if (action === "toggle-team") {
    const id = el.dataset.teamId;
    expandedTeam = expandedTeam === id ? null : id;
    expandedPlayer = null;
    render();
  }
  else if (action === "toggle-player") {
    const id = el.dataset.playerId;
    expandedPlayer = expandedPlayer === id ? null : id;
    render();
  }
  else if (action === "login-submit") {
    const pw = document.getElementById("pw-input").value;
    if (pw === ADMIN_PASSWORD) {
      isAdmin = true;
      sessionStorage.setItem("isAdmin", "true");
      view = "admin";
      pauseSync = true;
      scoreWeek = data.currentWeek || 1;
      loginError = "";
    } else {
      loginError = "Incorrect password.";
    }
    render();
  }
  else if (action === "save-scores") {
    const scores = { ...data.scores };
    appEl.querySelectorAll("[data-score-input]").forEach((input) => {
      const playerId = input.dataset.playerId;
      const raw = input.value;
      const num = raw === "" ? 0 : Number(raw);
      scores[playerId] = { ...(scores[playerId] || {}), [scoreWeek]: isNaN(num) ? 0 : num };
      flashPulse(playerId);
    });
    persist({ ...data, scores });
  }
  else if (action === "clear-week-points") {
    const ok = window.confirm(`This will remove every player's Week ${scoreWeek} points across the whole league. This can't be undone. Continue?`);
    if (!ok) return;
    const scores = {};
    Object.keys(data.scores || {}).forEach((playerId) => {
      const weekly = { ...data.scores[playerId] };
      delete weekly[scoreWeek];
      scores[playerId] = weekly;
    });
    persist({ ...data, scores });
  }
  else if (action === "save-league-settings") {
    const nameInput = document.getElementById("league-name-input");
    const weeksInput = document.getElementById("total-weeks-input");
    const budgetInput = document.getElementById("budget-per-team-input");
    const name = nameInput.value.trim();
    const weeks = Math.max(1, Math.min(60, Number(weeksInput.value) || data.totalWeeks));
    const budget = Math.max(0, Number(budgetInput.value) || 0);
    if (!name) return;
    persist({ ...data, leagueName: name, totalWeeks: weeks, budgetPerTeam: budget });
  }
  else if (action === "save-rumper-settings") {
    const startWeek = Number(document.getElementById("rumper-start-week").value);
    const endWeek = Number(document.getElementById("rumper-end-week").value);
    const excludedTeamIds = Array.from(appEl.querySelectorAll(".rumper-exclude-checkbox:checked")).map((el) => el.value);
    const enabled = document.getElementById("rumper-enabled-checkbox").checked;
    if (endWeek < startWeek) {
      saveError = "The Rumper League's end week can't be before its start week.";
      render();
      return;
    }
    persist({ ...data, rumperLeague: { startWeek, endWeek, excludedTeamIds, enabled } });
  }
  else if (action === "add-team") {
    const nameInput = document.getElementById("new-team-name");
    const name = nameInput.value.trim();
    if (!name) return;
    const next = { ...data, teams: [...data.teams, { id: uid("t"), name }] };
    persist(next);
  }
  else if (action === "remove-team") {
    const teamId = el.dataset.teamId;
    const next = {
      ...data,
      teams: data.teams.filter((t) => t.id !== teamId),
      players: data.players.filter((p) => p.teamId !== teamId),
    };
    persist(next);
  }
  else if (action === "add-player") {
    const nameInput = document.getElementById("new-player-name");
    const posSelect = document.getElementById("new-player-position");
    const clubInput = document.getElementById("new-player-club");
    const name = nameInput.value.trim();
    if (!name) return;
    newPlayerPosition = posSelect.value;
    const next = {
      ...data,
      players: [...data.players, {
        id: uid("p"), name,
        position: posSelect.value,
        club: clubInput.value.trim(),
      }],
    };
    persist(next);
  }
  else if (action === "clear-player-list") {
    const ok = window.confirm(`This will permanently delete all ${data.players.length} players from the player list, remove them from every team's squad, and clear their scores. This can't be undone. Continue?`);
    if (!ok) return;
    const teams = data.teams.map((t) => Array.isArray(t.squad) ? { ...t, squad: [] } : t);
    persist({ ...data, players: [], scores: {}, teams });
  }
  else if (action === "edit-club") {
    editingClubPlayerId = el.dataset.playerId;
    render();
  }
  else if (action === "cancel-edit-club") {
    editingClubPlayerId = null;
    render();
  }
  else if (action === "save-club") {
    const playerId = el.dataset.playerId;
    const input = document.getElementById(`edit-club-input-${playerId}`);
    const newClub = input ? input.value.trim() : "";
    const players = data.players.map((p) => p.id === playerId ? { ...p, club: newClub } : p);
    editingClubPlayerId = null;
    persist({ ...data, players });
  }
  else if (action === "remove-player") {
    const playerId = el.dataset.playerId;
    const scores = { ...data.scores };
    delete scores[playerId];
    const teams = data.teams.map((t) => Array.isArray(t.squad)
      ? { ...t, squad: t.squad.filter((entry) => normalizeSquadEntry(entry).id !== playerId) }
      : t);
    persist({ ...data, players: data.players.filter((p) => p.id !== playerId), scores, teams });
  }
  else if (action === "select-squad-team") {
    selectedSquadTeamId = el.dataset.teamId;
    render();
  }
  else if (action === "set-formation") {
    if (!selectedSquadTeamId) return;
    const formation = el.dataset.formation;
    const teams = data.teams.map((t) => t.id === selectedSquadTeamId ? { ...t, formation } : t);
    persist({ ...data, teams });
  }
  else if (action === "save-squad") {
    if (!selectedSquadTeamId) return;
    const selects = appEl.querySelectorAll(".squad-slot");
    const costInputs = appEl.querySelectorAll(".squad-slot-cost");
    const chosen = [];
    let duplicate = false;
    selects.forEach((sel, i) => {
      if (sel.value) {
        if (chosen.some((c) => c.id === sel.value)) duplicate = true;
        const rawCost = costInputs[i] ? costInputs[i].value : "";
        const cost = rawCost === "" ? 0 : Number(rawCost);
        chosen.push({ id: sel.value, cost: isNaN(cost) ? 0 : cost });
      }
    });
    if (duplicate) {
      saveError = "The same player is selected in more than one slot — fix that before saving.";
      render();
      return;
    }
    const spend = chosen.reduce((sum, c) => sum + (c.cost || 0), 0);
    const budget = data.budgetPerTeam ?? 100;
    if (spend > budget) {
      saveError = `That squad costs ${fmtCost(spend)}, which is over the ${fmtCost(budget)} budget — reduce a cost or swap a player before saving.`;
      render();
      return;
    }
    const teams = data.teams.map((t) => t.id === selectedSquadTeamId ? { ...t, squad: chosen } : t);
    persist({ ...data, teams });
  }
  else if (action === "download-template") {
    downloadTemplate();
  }
  else if (action === "trigger-import") {
    document.getElementById("import-file-input").click();
  }
  else if (action === "download-weekly-points-template") {
    downloadWeeklyPointsTemplate();
  }
  else if (action === "trigger-weekly-points-import") {
    document.getElementById("import-weekly-points-input").click();
  }
  else if (action === "add-fixture") {
    const week = Number(document.getElementById("new-fixture-week").value);
    const date = document.getElementById("new-fixture-date").value;
    const homeClub = document.getElementById("new-fixture-home").value.trim();
    const awayClub = document.getElementById("new-fixture-away").value.trim();
    if (!homeClub || !awayClub) return;
    const fixtures = [...(data.fixtures || []), { id: uid("f"), week, date, homeClub, awayClub, homeScore: null, awayScore: null }];
    persist({ ...data, fixtures });
  }
  else if (action === "download-fixtures-template") {
    downloadFixturesTemplate();
  }
  else if (action === "trigger-fixtures-import") {
    document.getElementById("import-fixtures-input").click();
  }
  else if (action === "remove-fixture") {
    const id = el.dataset.fixtureId;
    persist({ ...data, fixtures: (data.fixtures || []).filter((f) => f.id !== id) });
  }
  else if (action === "save-fixture-score") {
    const id = el.dataset.fixtureId;
    const homeInput = appEl.querySelector(`[data-fixture-home="${id}"]`);
    const awayInput = appEl.querySelector(`[data-fixture-away="${id}"]`);
    const homeScore = homeInput.value === "" ? null : Number(homeInput.value);
    const awayScore = awayInput.value === "" ? null : Number(awayInput.value);
    const fixtures = (data.fixtures || []).map((f) => f.id === id ? { ...f, homeScore, awayScore } : f);
    persist({ ...data, fixtures });
  }
  else if (action === "save-opening-window-label") {
    const label = document.getElementById("opening-window-label-input").value.trim();
    persist({ ...data, openingWindowLabel: label });
  }
  else if (action === "add-transfer-window") {
    const name = document.getElementById("new-window-name").value.trim();
    const effectiveWeek = Number(document.getElementById("new-window-effective-week").value);
    if (!name) return;
    const transferWindows = [...(data.transferWindows || []), { id: uid("tw"), name, effectiveWeek }];
    persist({ ...data, transferWindows });
  }
  else if (action === "remove-transfer-window") {
    const id = el.dataset.windowId;
    persist({ ...data, transferWindows: (data.transferWindows || []).filter((w) => w.id !== id) });
  }
  else if (action === "reset-transfers") {
    const count = (data.transferLog || []).length;
    const ok = window.confirm(`This will undo all ${count} recorded transfer(s) — sold players return to their original team, signed players are removed, and points go back to being based purely on current squads. This can't be undone. Continue?`);
    if (!ok) return;
    let teams = data.teams.map((t) => ({ ...t, squad: getSquadEntries(data, t) }));
    (data.transferLog || []).slice().reverse().forEach((t) => {
      teams = teams.map((team) => {
        if (team.id !== t.teamId) return team;
        if (t.type === "sold") {
          // Give the player back to the team that sold them.
          if (team.squad.some((e) => e.id === t.playerId)) return team;
          return { ...team, squad: [...team.squad, { id: t.playerId, cost: t.cost }] };
        } else {
          // Remove the player the team signed.
          return { ...team, squad: team.squad.filter((e) => e.id !== t.playerId) };
        }
      });
    });
    persist({ ...data, teams, ownership: [], transferLog: [] });
  }
  else if (action === "record-sell") {
    const windowId = document.getElementById("transfer-window-select").value;
    const teamId = document.getElementById("transfer-team-select").value;
    const playerId = document.getElementById("sell-player-select").value;
    const win = (data.transferWindows || []).find((w) => w.id === windowId);
    if (!win || !teamId || !playerId || !Number.isFinite(win.effectiveWeek)) {
      saveError = "Couldn't record that sale — make sure a transfer window, team, and player are all selected.";
      render();
      return;
    }
    const player = data.players.find((p) => p.id === playerId);
    const allOwnership = getAllOwnershipEntries(data);
    const current = allOwnership.find((o) => o.playerId === playerId && o.teamId === teamId && o.toWeek === null);
    if (!current) return;
    const closedEntry = { ...current, toWeek: win.effectiveWeek - 1 };
    const ownership = [...(data.ownership || []).filter((o) => o.id !== current.id), closedEntry];
    // Always work from a real squad array (synthesizing one from legacy data if this
    // team never had an explicit squad set) so the sale actually removes the player.
    const teams = data.teams.map((t) => t.id === teamId
      ? { ...t, squad: getSquadEntries(data, t).filter((entry) => entry.id !== playerId) }
      : t);
    const transferLog = [...(data.transferLog || []), {
      id: uid("tl"), windowId, teamId, playerId,
      playerName: player ? player.name : "Unknown player",
      club: player ? player.club : "",
      type: "sold", cost: current.cost, week: win.effectiveWeek,
    }];
    persist({ ...data, ownership, teams, transferLog });
  }
  else if (action === "record-sign") {
    const windowId = document.getElementById("transfer-window-select").value;
    const teamId = document.getElementById("transfer-team-select").value;
    const playerId = document.getElementById("sign-player-select").value;
    const costInput = document.getElementById("sign-player-cost");
    const win = (data.transferWindows || []).find((w) => w.id === windowId);
    if (!win || !teamId || !playerId || !Number.isFinite(win.effectiveWeek)) {
      saveError = "Couldn't record that signing — make sure a transfer window, team, and player are all selected.";
      render();
      return;
    }
    if (findOwningTeam(data, playerId)) return; // already owned somewhere
    const player = data.players.find((p) => p.id === playerId);
    const cost = costInput.value === "" ? 0 : Number(costInput.value);
    const safeCost = isNaN(cost) ? 0 : cost;
    const currentSpend = getSquadEntries(data, data.teams.find((t) => t.id === teamId)).reduce((sum, e) => {
      const p = data.players.find((pp) => pp.id === e.id);
      return sum + (e.cost !== null && e.cost !== undefined ? e.cost : (p && p.cost) || 0);
    }, 0);
    const budget = data.budgetPerTeam ?? 100;
    if (currentSpend + safeCost > budget) {
      saveError = `Signing this player for ${fmtCost(safeCost)} would put this team at ${fmtCost(currentSpend + safeCost)}, over the ${fmtCost(budget)} budget.`;
      render();
      return;
    }
    const newEntry = { id: uid("own"), playerId, teamId, fromWeek: win.effectiveWeek, toWeek: null, cost: safeCost };
    const ownership = [...(data.ownership || []), newEntry];
    const teams = data.teams.map((t) => t.id === teamId
      ? { ...t, squad: [...(Array.isArray(t.squad) ? t.squad : getSquadEntries(data, t)), { id: playerId, cost: newEntry.cost }] }
      : t);
    const transferLog = [...(data.transferLog || []), {
      id: uid("tl"), windowId, teamId, playerId,
      playerName: player ? player.name : "Unknown player",
      club: player ? player.club : "",
      type: "signed", cost: newEntry.cost, week: win.effectiveWeek,
    }];
    persist({ ...data, ownership, teams, transferLog });
  }
  else if (action === "add-cupgame") {
    const round = document.getElementById("new-cupgame-round").value.trim();
    const homeTeamId = document.getElementById("new-cupgame-home").value;
    const awayTeamId = document.getElementById("new-cupgame-away").value;
    if (!round || !homeTeamId || !awayTeamId || homeTeamId === awayTeamId) return;
    const cupGames = [...(data.cupGames || []), { id: uid("c"), round, homeTeamId, awayTeamId, homeScore: null, awayScore: null }];
    persist({ ...data, cupGames });
  }
  else if (action === "remove-cupgame") {
    const id = el.dataset.cupgameId;
    persist({ ...data, cupGames: (data.cupGames || []).filter((g) => g.id !== id) });
  }
  else if (action === "save-cupgame-score") {
    const id = el.dataset.cupgameId;
    const homeInput = appEl.querySelector(`[data-cupgame-home="${id}"]`);
    const awayInput = appEl.querySelector(`[data-cupgame-away="${id}"]`);
    const homeScore = homeInput.value === "" ? null : Number(homeInput.value);
    const awayScore = awayInput.value === "" ? null : Number(awayInput.value);
    const cupGames = (data.cupGames || []).map((g) => g.id === id ? { ...g, homeScore, awayScore } : g);
    persist({ ...data, cupGames });
  }
  else if (action === "save-prizes") {
    const text = document.getElementById("prizes-text-input").value;
    persist({ ...data, prizesText: text });
  }
}

function handleImportFixturesFile(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  importingFixtures = true;
  fixturesImportStatus = null;
  render();

  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const wb = XLSX.read(evt.target.result, { type: "array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      if (!rows.length) {
        fixturesImportStatus = { type: "error", message: "That file doesn't have any rows to import." };
        importingFixtures = false;
        render();
        return;
      }
      const keys = Object.keys(rows[0]);
      const findKey = (target) => keys.find((k) => k.trim().toLowerCase() === target);
      const weekKey = findKey("gameweek") || findKey("week") || findKey("gw");
      const dateKey = findKey("date");
      const homeKey = findKey("home") || findKey("home team") || findKey("hometeam");
      const awayKey = findKey("away") || findKey("away team") || findKey("awayteam");

      if (!weekKey || !homeKey || !awayKey) {
        fixturesImportStatus = { type: "error", message: "Couldn't find 'Gameweek', 'Home', and 'Away' columns. Use the template for the right headers." };
        importingFixtures = false;
        render();
        return;
      }

      let fixtures = [...(data.fixtures || [])];
      let added = 0, updated = 0;

      rows.forEach((row) => {
        const week = Number(row[weekKey]);
        const homeClub = String(row[homeKey] || "").trim();
        const awayClub = String(row[awayKey] || "").trim();
        if (!week || !homeClub || !awayClub) return;
        let date = "";
        if (dateKey) {
          const raw = row[dateKey];
          if (raw instanceof Date) {
            date = raw.toISOString().slice(0, 10);
          } else if (typeof raw === "number") {
            // Excel serial date
            const d = XLSX.SSF.parse_date_code(raw);
            if (d) date = `${d.y}-${String(d.m).padStart(2, "0")}-${String(d.d).padStart(2, "0")}`;
          } else {
            date = String(raw || "").trim();
          }
        }

        const existing = fixtures.find((f) =>
          f.week === week &&
          f.homeClub.toLowerCase() === homeClub.toLowerCase() &&
          f.awayClub.toLowerCase() === awayClub.toLowerCase()
        );
        if (existing) {
          existing.date = date;
          updated++;
        } else {
          fixtures.push({ id: uid("f"), week, date, homeClub, awayClub, homeScore: null, awayScore: null });
          added++;
        }
      });

      persist({ ...data, fixtures });
      fixturesImportStatus = {
        type: "ok",
        message: `Imported: ${added} new fixture${added === 1 ? "" : "s"}${updated ? `, ${updated} updated` : ""}.`,
      };
    } catch (err) {
      fixturesImportStatus = { type: "error", message: "Couldn't read that file. Make sure it's a .xlsx or .csv export." };
    } finally {
      importingFixtures = false;
      const input = document.getElementById("import-fixtures-input");
      if (input) input.value = "";
      render();
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleImportWeeklyPointsFile(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const week = weeklyPointsImportWeek;
  importingWeeklyPoints = true;
  weeklyPointsImportStatus = null;
  render();

  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const wb = XLSX.read(evt.target.result, { type: "array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      if (!rows.length) {
        weeklyPointsImportStatus = { type: "error", message: "That file doesn't have any rows to import." };
        importingWeeklyPoints = false;
        render();
        return;
      }
      const keys = Object.keys(rows[0]);
      const findKey = (target) => keys.find((k) => k.trim().toLowerCase() === target);
      const playerKey = findKey("player") || findKey("name");
      const clubKey = findKey("club") || findKey("real team") || findKey("realteam");
      const pointsKey = findKey("points") || findKey("pts") || findKey("score");

      if (!playerKey || !clubKey || !pointsKey) {
        weeklyPointsImportStatus = { type: "error", message: "Couldn't find 'Player', 'Club', and 'Points' columns. Use the template for the right headers." };
        importingWeeklyPoints = false;
        render();
        return;
      }

      const scores = { ...data.scores };
      let updated = 0;
      const errors = [];

      rows.forEach((row) => {
        const playerName = String(row[playerKey] || "").trim();
        const club = String(row[clubKey] || "").trim();
        if (!playerName) return;

        const rawPoints = row[pointsKey];
        const points = Number(rawPoints);
        if (rawPoints === "" || isNaN(points)) {
          errors.push(`${playerName}${club ? " (" + club + ")" : ""}: missing or invalid points value, skipped.`);
          return;
        }

        const matches = data.players.filter((p) =>
          p.name.toLowerCase() === playerName.toLowerCase() &&
          (p.club || "").toLowerCase() === club.toLowerCase()
        );

        if (matches.length === 0) {
          errors.push(`${playerName} (${club || "no club given"}): no matching player found in the pool, skipped.`);
          return;
        }
        if (matches.length > 1) {
          errors.push(`${playerName} (${club}): matched more than one player with this exact name and club, skipped — fix the duplicate in the Player list first.`);
          return;
        }

        const player = matches[0];
        scores[player.id] = { ...(scores[player.id] || {}), [week]: points };
        updated++;
      });

      persist({ ...data, scores });
      weeklyPointsImportStatus = {
        type: errors.length && !updated ? "error" : "ok",
        message: `Week ${week}: updated ${updated} player${updated === 1 ? "" : "s"}${errors.length ? `, ${errors.length} skipped` : ""}.`,
        errors,
      };
    } catch (err) {
      weeklyPointsImportStatus = { type: "error", message: "Couldn't read that file. Make sure it's a .xlsx or .csv export." };
    } finally {
      importingWeeklyPoints = false;
      const input = document.getElementById("import-weekly-points-input");
      if (input) input.value = "";
      render();
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleImportFile(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  importing = true;
  importStatus = null;
  render();

  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const wb = XLSX.read(evt.target.result, { type: "array" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      if (!rows.length) {
        importStatus = { type: "error", message: "That file doesn't have any rows to import." };
        importing = false;
        render();
        return;
      }
      const keys = Object.keys(rows[0]);
      const findKey = (target) => keys.find((k) => k.trim().toLowerCase() === target);
      const playerKey = findKey("player") || findKey("name");
      const posKey = findKey("position") || findKey("pos");
      const clubKey = findKey("club") || findKey("real team") || findKey("realteam");
      const weekKeys = keys.filter((k) => /^week\s*\d+$/i.test(k.trim()));

      if (!playerKey) {
        importStatus = { type: "error", message: "Couldn't find a 'Player' column. Use the template for the right headers." };
        importing = false;
        render();
        return;
      }

      let players = [...data.players];
      let scores = { ...data.scores };
      let playersAdded = 0, playersUpdated = 0;

      rows.forEach((row) => {
        const playerName = String(row[playerKey] || "").trim();
        if (!playerName) return;

        let position = posKey ? String(row[posKey] || "").trim().toUpperCase() : "";
        if (!POSITIONS.includes(position)) position = "MID";

        const club = clubKey ? String(row[clubKey] || "").trim() : "";

        let player = players.find((p) =>
          p.name.toLowerCase() === playerName.toLowerCase() &&
          (p.club || "").toLowerCase() === club.toLowerCase()
        );
        if (!player) {
          player = { id: uid("p"), name: playerName, position, club };
          players.push(player);
          playersAdded++;
        } else {
          player.position = position;
          if (clubKey) player.club = club;
          playersUpdated++;
        }

        weekKeys.forEach((wk) => {
          const weekNum = parseInt(wk.match(/\d+/)[0], 10);
          const raw = row[wk];
          if (raw === "" || raw === null || raw === undefined) return;
          const num = Number(raw);
          if (isNaN(num)) return;
          scores[player.id] = { ...(scores[player.id] || {}), [weekNum]: num };
        });
      });

      const maxWeekFromFile = weekKeys.reduce((max, wk) => Math.max(max, parseInt(wk.match(/\d+/)[0], 10)), 0);

      const next = { ...data, players, scores, totalWeeks: Math.max(data.totalWeeks, maxWeekFromFile) };
      persist(next);
      importStatus = {
        type: "ok",
        message: `Imported: ${playersAdded} new player${playersAdded === 1 ? "" : "s"}${playersUpdated ? `, ${playersUpdated} player${playersUpdated === 1 ? "" : "s"} updated` : ""}. Assign them to squads in the Squad builder above.`,
      };
    } catch (err) {
      importStatus = { type: "error", message: "Couldn't read that file. Make sure it's a .xlsx or .csv export." };
    } finally {
      importing = false;
      const input = document.getElementById("import-file-input");
      if (input) input.value = "";
      render();
    }
  };
  reader.readAsArrayBuffer(file);
}
